<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة معرض الفيديوهات</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #252525; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        .v-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { padding: 15px; }
    </style>
</head>
<body>

    <h1>المعرض التجريبي 🎬</h1>
    <div id="videoGallery" class="grid"></div>

    <script>
        // مصفوفة البيانات
        const myVideos = [
            { id: "69c2b2b69ae74a3428950968", title: "فيديو تجربة 1" },
            { id: "69c2b2b69ae74a3428950968", title: "فيديو تجربة 2" }
        ];

        function loadGallery() {
            const gallery = document.getElementById('videoGallery');
            
            // لاحظ استخدام علامة الـ ` قبل الـ <div> والـ ` بعد الـ </div>
            const htmlContent = myVideos.map(video => `
                <div class="card">
                    <div class="v-wrap">
                        <iframe
                            src="https://play.gumlet.io/embed/${video.id}"
                            allow="fullscreen"
                            loading="lazy">
                        </iframe>
                    </div>
                    <div class="info">
                        <h3>${video.title}</h3>
                    </div>
                </div>
            `).join('');

            gallery.innerHTML = htmlContent;
        }

        // تشغيل الدالة فور تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
